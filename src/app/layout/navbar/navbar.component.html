<div id="main-navbar">
  <nav class="navbar">
    <button
      class="navbar__toggle"
      (click)="toggleMenu()"
      aria-label="Toggle Menu"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <ul class="navbar__menu" [class.active]="isMenuOpen">
      <li routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <a routerLink="/home" routerLinkActive="active">
          <i class="bi bi-house-door-fill"></i>
          home
        </a>
      </li>
      <li routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <a routerLink="/about" routerLinkActive="active">
          <!-- <i class="bi bi-bookmark-fill"></i> -->
          about
        </a>
      </li>
    </ul>

    <div class="form-check form-switch mobile-switch-btn" >
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="switchCheckChecked"
        checked
      />
      <label class="form-check-label" for="switchCheckChecked">Mode</label>
    </div>
  </nav>

  <div class="form-check form-switch desktop-switch-btn" >
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="switchCheckChecked"
        checked
      />
      <label class="form-check-label" for="switchCheckChecked">Mode</label>
    </div>
</div>
